apiVersion: agent.benjamin-borbe.de/v1
kind: Config
metadata:
  name: agent-pr-reviewer
  namespace: '{{ "NAMESPACE" | env }}'
spec:
  assignee: pr-reviewer-agent
  priorityClassName: agent-pr-reviewer
  image: '{{"DOCKER_REGISTRY" | env}}/agent-pr-reviewer'
  heartbeat: 5m
  secretName: agent-pr-reviewer
  volumeClaim: agent-pr-reviewer
  volumeMountPath: /home/claude/.claude
  env:
    # Tell Claude Code where the config + plugins live (matches volumeMountPath).
    # Without this, the agent runs without /coding plugin loaded → /coding:pr-review
    # slash command not registered → execution phase falls back to inline prompt.
    CLAUDE_CONFIG_DIR: /home/claude/.claude
  trigger:
    statuses:
      - in_progress
    phases:
      - planning
      - in_progress
      - ai_review
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 5Gi
    limits:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 5Gi
